# ─────────────────────────────────────────────────────────────────────────────
# Observal CI — runs on every PR targeting main and on pushes to main.
#
# Recommended branch-protection rules (Settings → Branches → main):
#   Required status checks:
#     • lint
#     • reuse-lint
#     • test (3.11)
#     • test (3.12)
#     • test (3.13)
#     • web-lint
#     • docker-build
#     • security-scan
#   Require a pull request before merging
#   Require approvals: 1
#   Do not allow bypassing the above settings
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Job 0: Path filtering ─────────────────────────────────────────────────────
jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      python: ${{ steps.filter.outputs.python }}
      web: ${{ steps.filter.outputs.web }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            python:
              - 'observal_cli/**/*.py'
              - 'observal-server/**/*.py'
              - 'tests/**/*.py'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Makefile'
              - '.pre-commit-config.yaml'
              - '.github/workflows/ci.yml'
            web:
              - 'web/**'
              - '.github/workflows/ci.yml'
            docker:
              - 'docker/**'
              - 'observal_cli/**'
              - 'observal-server/**'
              - 'web/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'web/package.json'
              - 'pnpm-lock.yaml'
              - '.env.example'
              - '.github/workflows/ci.yml'

# ── Job 1: Python lint ────────────────────────────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Skip if no Python changes
        if: needs.changes.outputs.python != 'true'
        run: |
          echo "::notice::No Python changes detected, skipping lint"
          echo "This job reports success to satisfy branch protection"

      - uses: actions/checkout@v6
        if: needs.changes.outputs.python == 'true'

      - uses: astral-sh/setup-uv@v8.1.0
        if: needs.changes.outputs.python == 'true'
        with:
          enable-cache: true

      - name: Install Python 3.13
        if: needs.changes.outputs.python == 'true'
        run: uv python install 3.13

      - name: ruff check
        if: needs.changes.outputs.python == 'true'
        run: uv run --with ruff==0.15.10 ruff check .

      - name: ruff format --check
        if: needs.changes.outputs.python == 'true'
        run: uv run --with ruff==0.15.10 ruff format --check .

# ── Job 2: REUSE license compliance ──────────────────────────────────────────────
  reuse-lint:
    name: reuse-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: REUSE compliance check
        uses: fsfe/reuse-action@v6

# ── Job 3: Python tests (matrix) ──────────────────────────────────────────────
  test:
    name: test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Skip if no Python changes
        if: needs.changes.outputs.python != 'true'
        run: |
          echo "::notice::No Python changes detected, skipping test"
          echo "This job reports success to satisfy branch protection"

      - uses: actions/checkout@v6
        if: needs.changes.outputs.python == 'true'

      - uses: astral-sh/setup-uv@v8.1.0
        if: needs.changes.outputs.python == 'true'
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        if: needs.changes.outputs.python == 'true'
        run: uv python install ${{ matrix.python-version }}

      - name: Install project dependencies
        if: needs.changes.outputs.python == 'true'
        run: |
          cd observal-server
          uv sync --python ${{ matrix.python-version }} --group dev

      - name: Run pytest
        if: needs.changes.outputs.python == 'true'
        run: |
          cd observal-server
          uv run \
            --python ${{ matrix.python-version }} \
            --with asyncpg \
            --with hypothesis \
            --with pyarrow \
            --with pytest-cov \
            pytest ../tests/ -q \
              ${{ matrix.python-version == '3.13' && '--cov=../observal_cli --cov=. --cov-report=xml' || '' }}

      - name: Upload coverage to Codecov
        if: needs.changes.outputs.python == 'true' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@v6
        with:
          files: observal-server/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

# ── Job 4: Next.js lint + typecheck ───────────────────────────────────────────
  web-lint:
    name: web-lint
    runs-on: ubuntu-latest
    needs: changes
    defaults:
      run:
        working-directory: web

    steps:
      - name: Skip if no web changes
        if: needs.changes.outputs.web != 'true'
        working-directory: .
        run: |
          echo "::notice::No web changes detected, skipping web-lint"
          echo "This job reports success to satisfy branch protection"

      - uses: actions/checkout@v6
        if: needs.changes.outputs.web == 'true'

      - uses: pnpm/action-setup@v6
        if: needs.changes.outputs.web == 'true'

      - uses: actions/setup-node@v6
        if: needs.changes.outputs.web == 'true'
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: needs.changes.outputs.web == 'true'
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: ESLint
        if: needs.changes.outputs.web == 'true'
        run: pnpm run lint

      - name: TypeScript typecheck
        if: needs.changes.outputs.web == 'true'
        run: pnpm run typecheck

# ── Job 4: Import boundary check ─────────────────────────────────────────────
  import-boundary:
    name: import-boundary
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Check ee/ import boundary
        run: |
          echo "Checking that core does not import from ee/..."
          VIOLATIONS=$(grep -rn "from ee\b\|import ee\b" observal-server/ observal_cli/ --include="*.py" | grep -v "main.py" | grep -v "services/insights/__init__.py" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Import boundary violation — core must not import from ee/"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✓ No import boundary violations found"

# ── Job 5: Docker build ───────────────────────────────────────────────────────
  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs: changes
    defaults:
      run:
        working-directory: docker

    steps:
      - name: Skip if no Docker changes
        if: needs.changes.outputs.docker != 'true'
        working-directory: .
        run: |
          echo "::notice::No Docker changes detected, skipping docker-build"
          echo "This job reports success to satisfy branch protection"

      - uses: actions/checkout@v6
        if: needs.changes.outputs.docker == 'true'

      - name: Create stub .env
        if: needs.changes.outputs.docker == 'true'
        run: touch ../.env

      - name: Build images
        if: needs.changes.outputs.docker == 'true'
        run: docker compose build

# ── Job 5: Python SAST with bandit ──────────────────────────────────────────
  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install Python 3.12
        run: uv python install 3.12
      - name: Run bandit
        run: uv run --with bandit bandit -r observal-server/ observal_cli/ -c pyproject.toml -f json -o bandit-report.json || true
      - name: Check bandit results
        run: uv run --with bandit bandit -r observal-server/ observal_cli/ -c pyproject.toml -ll

# ── Job 6: Dependency audit ─────────────────────────────────────────────────
  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Python dependency audit
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Run pip-audit
        # TODO: burn down pre-existing advisories then remove || true
        run: |
          uv python install 3.12
          cd observal-server
          uv run --with pip-audit pip-audit --strict --desc || true

      - name: JS dependency audit
        uses: pnpm/action-setup@v6
      - name: Run pnpm audit
        run: |
          pnpm install --frozen-lockfile
          pnpm audit --prod || true
